name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Debug URL
        run: |
          echo "URL length: ${#SUPABASEURL}"
          echo "URL value: '$SUPABASEURL'"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASEURL }}

      - name: Ping Supabase
        run: |
          curl -v \
            -H "apikey: ${{ secrets.SUPABASEANONKEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASEANONKEY }}" \
            "${{ secrets.SUPABASEURL }}/rest/v1/"
