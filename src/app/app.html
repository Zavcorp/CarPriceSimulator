<p-toast position="top-right" />

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 border-b border-white/[0.06]"
     style="background: rgba(15,17,23,0.85); backdrop-filter: blur(16px);">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3 group">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center"
           style="background: var(--brand-primary)">
        <i class="pi pi-car text-white text-sm"></i>
      </div>
      <span class="font-display font-700 text-lg tracking-tight"
            style="color: var(--text-primary)">AutoSim</span>
    </a>

    <!-- Right side -->
    <div class="flex items-center gap-3">
      @if (auth.isAuthenticated()) {
        <span class="text-sm" style="color: var(--text-muted)">
          {{ auth.user()?.email }}
        </span>
        <a routerLink="/admin"
           class="text-sm px-4 py-1.5 rounded-lg border transition-all"
           style="border-color: var(--border-color); color: var(--brand-accent)">
          Panel Admin
        </a>
        <button (click)="auth.signOut()"
                class="text-sm px-4 py-1.5 rounded-lg transition-all hover:bg-white/5"
                style="color: var(--text-muted)">
          Salir
        </button>
      } @else {
        <button (click)="showLoginModal.set(true)"
                class="flex items-center gap-2 text-sm px-4 py-2 rounded-lg transition-all"
                style="background: var(--brand-primary); color: white;">
          <i class="pi pi-user text-xs"></i>
          Acceso
        </button>
      }
    </div>
  </div>
</nav>

<main class="min-h-screen">
  <router-outlet />
</main>

<!-- LOGIN MODAL -->
<app-login-modal
  [visible]="showLoginModal()"
  (visibleChange)="showLoginModal.set($event)"
  (loginSuccess)="onLoginSuccess()" />
